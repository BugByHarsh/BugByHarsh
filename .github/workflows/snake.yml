name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: BugByHarsh
          outputs: |
            dist/github-contribution-grid-snake-dark.svg

      - name: Push to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin

          # Check if output branch exists
          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git checkout output
          else
            git checkout --orphan output
          fi

          # Clean branch
          rm -rf *

          # Copy generated file
          cp dist/github-contribution-grid-snake-dark.svg .

          git add github-contribution-grid-snake-dark.svg
          git commit -m "update snake" || echo "No changes"

          git push origin output --force
