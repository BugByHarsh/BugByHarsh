name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fixes warning

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # IMPORTANT (fixes git issues)

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: BugByHarsh
          outputs: dist/snake.svg

      - name: Push to output branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Create a clean orphan branch every time (simplest + no conflicts)
          git checkout --orphan output
          git reset --hard

          # Copy generated file
          cp dist/snake.svg snake.svg

          git add snake.svg
          git commit -m "update snake"

          git push origin output --force
